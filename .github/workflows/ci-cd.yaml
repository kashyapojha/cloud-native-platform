name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and Push Auth Service
        run: |
          docker build -t karann24/auth-service:latest ./auth_service
          docker push karann24/auth-service:latest

      - name: Build and Push User Service
        run: |
          docker build -t karann24/user-service:latest ./user_service
          docker push karann24/user-service:latest

      - name: Build and Push Product Service
        run: |
          docker build -t karann24/product-service:latest ./product_service
          docker push karann24/product-service:latest
